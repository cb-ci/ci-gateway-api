apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: cjoc-health-check-policy
  namespace: cloudbees-gatewayapi
spec:
  default:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /cjoc/health/
    logConfig:
      enabled: true
  targetRef:
    group: ""
    kind: Service
    name: cjoc
