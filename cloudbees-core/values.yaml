## Install Default RBAC roles and bindings
rbac:
  # rbac.install -- Install `role`/`rolebindings`/`serviceAccount`.
  # If false (and rbac is enabled in the cluster anyway), provide valid names for all service accounts.
  # DEPRECATED: This value should be always true
  install: true
  # rbac.installCluster -- Install `clusterrole`/`clusterrolebinding`
  # These cluster roles are optional but prevent usage of some features, so we recommend setting them up.
  # Defaults to true, except on Openshift where it defaults to false
  # Please refer to templates/cjoc-clusterrole-master-management.yaml in the chart
  #installCluster: true

  # rbac.serviceAccountName -- Name of the service account Operations Center will run as
  serviceAccountName: cjoc
  # rbac.serviceAccountAnnaotations -- Optional service account annotations to enable things like [Workload Identity](https://cloud.google.com/kubernetes-engine/docs/how-to/workload-identity#authenticating_to) permissions.
  serviceAccountAnnotations: {}
  # rbac.masterServiceAccountName -- Name of the service account Jenkins masters will run as
  # DEPRECATED: each controller uses its own service account now
  masterServiceAccountName: jenkins
  # rbac.serviceAccountAnnaotations -- Optional service account annotations to enable things like [Workload Identity](https://cloud.google.com/kubernetes-engine/docs/how-to/workload-identity#authenticating_to) permissions.
  masterServiceAccountAnnotations: {}
  # rbac.agentServiceAccountName -- Name of the service account Jenkins agents will run as
  agentsServiceAccountName: jenkins-agents
  # rbac.serviceAccountAnnaotations -- Optional service account annotations to enable things like [Workload Identity](https://cloud.google.com/kubernetes-engine/docs/how-to/workload-identity#authenticating_to) permissions.
  agentsServiceAccountAnnotations: {}
  # rbac.hibernationMonitorServiceAccountName -- Name of the service account the Hibernation monitor will run as (if enabled)
  hibernationMonitorServiceAccountName: managed-master-hibernation-monitor
  # rbac.pluggableStorageServiceServiceAccountName -- Name of the service account the Pluggable storage service will run as (if enabled)
  pluggableStorageServiceServiceAccountName: pluggable-storage-service
  # rbac.pluggableStorageServiceServiceAccountAnnotations -- Optional service account annotations to enable things like [Workload Identity](https://cloud.google.com/kubernetes-engine/docs/how-to/workload-identity#authenticating_to) permissions.
  pluggableStorageServiceServiceAccountAnnotations: {}
  # rbac.groupName -- Name of the group to bind to the role and cluster role for controller management. Used for e.g. [EKS access entries](https://docs.aws.amazon.com/eks/latest/userguide/access-entries.html)
  groupName: ""
# CASC Bundle Service (optional).
# ToDo: Link with the proper documentation explaining the Bundle Service when available.
CascBundleService:
  # CascBundleService.enabled -- Whether to enable the installation of the CasC Bundle Service for the cluster
  enabled: false
  image:
    # CascBundleService.image.registry -- Docker registry for CasC Bundle Service
    registry: null
    # CascBundleService.image.repository -- Docker image repository for CasC Bundle Service
    repository: cloudbees-casc-bundle-service
    # CascBundleService.image.tag -- Docker image tag for CasC Bundle Service
    tag: 779.0c64d59bde91
    # CascBundleService.image.dockerImage -- full Docker image path for CasC Bundle Service
    dockerImage: null
    # CascBundleService.image.pullPolicy -- https://kubernetes.io/docs/concepts/containers/images/#updating-images
    pullPolicy: IfNotPresent
  resources:
    limits:
      # CascBundleService.resources.limits.cpu -- CPU limit to run CasC Bundle Service
      # https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/#meaning-of-cpu
      # Set to 0 to disable CPU limits (no limit will be applied)
      cpu: 500m
      # CascBundleService.resources.limits.memory -- Memory limit to run CasC Bundle Service
      # https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/#meaning-of-memory
      memory: 512M
    requests:
      # CascBundleService.resources.requests.cpu -- CPU request to run CasC Bundle Service
      # https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/#meaning-of-cpu
      cpu: 500m
      # CascBundleService.resources.requests.memory -- Memory request to run CasC Bundle Service
      # https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/#meaning-of-memory
      memory: 512M
  # CascBundleService.serviceAccountName -- Name of the service account the CasC Bundle Service will run as
  serviceAccountName: casc-bundle-service
  # CascBundleService.replicas -- Number of replicas the CasC Bundle Service will start by default.
  replicas: 2
  ingress:
    # CascBundleService.ingress.enabled -- whether or not we want to allow external access to the CasC Bundle Service.
    enabled: true
  ssh:
    # CascBundleService.ssh.strictHostKeyCheckingEnabled -- whether or not we check the host public key when retrieving via SSH.
    # SSH known hosts public keys can be configured in the CasC Bundle Service configuration secret as explained in the documentation.
    # ref: https://docs.cloudbees.com/docs/cloudbees-ci/latest/casc-controller/set-up-managed-controller-with-service#_add_connectors_to_the_casc_controller_bundle_service
    # DISABLING THIS OPTION IS A SECURITY RISK
    strictHostKeyCheckingEnabled: true
  # CascBundleService.autoversioning -- enable bundle autoversioning
  autoversioning: true
  # CascBundleService.pollingSchedule -- connectors polling schedule
  pollingSchedule: 5m
  podSecurityContext: {}
  containerSecurityContext: {}
  # CascBundleService.javaOpts -- Additional java options to pass to the CasC Bundle Service
  javaOpts: null
  # Image pull secrets
  # Enable this option when using a private registry.
  # https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/#create-a-secret-by-providing-credentials-on-the-command-line
  # CascBundleService.imagePullSecrets -- Name of image pull secret to pull private Docker images or an array of image pull secrets
  imagePullSecrets: null
  # CascBundleService.nodeSelector -- Node labels and tolerations for pod assignment
  # ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#nodeselector
  nodeSelector: {}
  # CascBundleService.tolerations -- Specify tolerations for the CasC Bundle Service pod.
  # See [documentation](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/)
  tolerations: []
  # CascBundleService.annotations -- Additional annotations to put on the pod running the CasC Bundle Service
  annotations: {}
  # CascBundleService.createConfig -- Whether the casc-bundle-service-config secret must be created by Helm or not.
  # A common use case is to let the Secret be managed by an external secret tool.
  # If this is set to false and the Secret is not created by other means, the service deployment will fail.
  createConfig: true
  # CascBundleService.credentialSecretsNamespace -- Namespace to manage the secrets to configure k8s based credentials.
  credentialSecretsNamespace: null
