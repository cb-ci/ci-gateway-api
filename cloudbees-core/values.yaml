# Pluggable storage service
PluggableStorageService:
  # PluggableStorageService.enabled -- Whether to enable the [Pluggable Storage service](cloudbees.com/r/pluggable-storage-build-logs).
  enabled: false
  # PluggableStorageService.storageBackend -- Either `AMAZON_S3` for Amazon S3 and S3 API-compatible backends, `GOOGLE_CLOUD_STORAGE` for Google Cloud Storage, or `AZURE_BLOB_STORAGE` for Microsoft Azure Blob Storage
  storageBackend: AMAZON_S3
  # PluggableStorageService.storageBucket -- The name of the storage bucket or container to use for build logs
  storageBucket: null
  # PluggableStorageService.storageObjectNamePrefix -- An optional prefix to the object name used when storing build logs
  storageObjectNamePrefix: ''
  # PluggableStorageService.storagePresignedUrlExpiryMinutes -- Controls expiration for the presigned URLs sent to controllers for uploading/downloading files from the storage backend
  storagePresignedUrlExpiryMinutes: 15
  storageOptionsS3:
    # PluggableStorageService.storageOptionsS3.region -- The name of the AWS region for the bucket.
    region: us-east-1
    # PluggableStorageService.storageOptionsS3.staticCredentialsSecret -- The name of a Kubernetes Secret containing the keys AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and optionally AWS_SESSION_TOKEN
    staticCredentialsSecret: null
    # PluggableStorageService.storageOptionsS3.endpointOverride -- The endpoint URI to access
    endpointOverride: null
    # PluggableStorageService.storageOptionsS3.pathStyleAccess -- Whether to use path-style access when accessing the storage endpoint rather than DNS-style access
    pathStyleAccess: false
    # PluggableStorageService.storageOptionsS3.ipv6Only -- Whether to use IPv6 when accessing the EC2 IMDS endpoint, will update the environment var AWS_EC2_METADATA_SERVICE_ENDPOINT_MODE to IPv6, see https://docs.aws.amazon.com/sdkref/latest/guide/feature-imds-credentials.html
    ipv6Only: false
  storageOptionsAzureBlobStorage:
    # PluggableStorageService.storageOptionsAzureBlobStorage.endpoint -- The endpoint URI for Azure Blob Storage
    endpoint: null
  # PluggableStorageService.javaOpts -- Additional Java options to pass to the Pluggable storage service JVM process
