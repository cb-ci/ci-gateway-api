      # Set to 0 to disable CPU limits (no limit will be applied)
      cpu: 500m
      # PluggableStorageService.resources.limits.memory -- Memory limit to run CloudBees build log service
      # https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/#meaning-of-memory
      memory: 500Mi
    requests:
      # PluggableStorageService.resources.requests.cpu -- CPU request to run CloudBees build log service
      # https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/#meaning-of-cpu
      cpu: 500m
      # PluggableStorageService.resources.requests.memory -- Memory request to run CloudBees build log service
      # https://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/#meaning-of-memory
      memory: 500Mi
  # PluggableStorageService.replicas -- Number of replicas CloudBees build log service will start by default.
  replicas: 2
