{{- if eq (include "rbac.install-cluster" .) "false" -}}
{{/* skipping clusterrole creation */}}
{{- else if or (eq (include "rbac.install-cluster" .) "true") (and .Values.rbac.install (not (include "cloudbees-core.is-openshift" .))) -}}
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cjoc-master-management-{{ .Release.Namespace }}
  labels:
{{ include "cloudbees-core.labels" . | indent 4 }}
rules:
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
- apiGroups:
  - apps
  resources:
  - statefulsets
  - deployments
  verbs:
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - list
  - watch
{{- end -}}
