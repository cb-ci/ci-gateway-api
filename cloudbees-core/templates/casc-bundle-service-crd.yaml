{{- if .Values.CascBundleService.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: connectorupdates.casc.bundleservice
  namespace: {{ default .Release.Namespace .Values.Master.OperationsCenterNamespace }}
  labels:
{{ include "cloudbees-core.labels" . | indent 4 }}
spec:
  group: casc.bundleservice
  names:
    kind: ConnectorUpdate
    listKind: ConnectorUpdateList
    plural: connectorupdates
    singular: connectorupdate
    shortNames:
      - cu
  scope: Namespaced
  versions:
    - name: v1
      schema:
        openAPIV3Schema:
          properties:
            spec:
              properties:
                updateTime:
                  type: integer
                connectorId:
                  type: string
              type: object
          required:
            - spec
          title: ConnectorUpdate
          type: object
      served: true
      storage: true
{{- end -}}
