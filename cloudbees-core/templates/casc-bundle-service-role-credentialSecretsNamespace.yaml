{{- if and .Values.CascBundleService.enabled .Values.CascBundleService.credentialSecretsNamespace}}
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: casc-bundle-service-credentialSecretsNamespace
  namespace: {{ .Values.CascBundleService.credentialSecretsNamespace }}
  labels:
{{ include "cloudbees-core.labels" . | indent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
{{- end }}
