{{- if .Values.SsoRelay.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ssorelay-review-token-{{ .Release.Namespace }}
  labels: {{- include "ssorelay.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: {{.Values.SsoRelay.controller.name}}
    namespace: {{ include "ssorelay.namespace" . | quote }}
{{- end }}
