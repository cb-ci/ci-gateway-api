{{- if .Values.CascBundleService.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: casc-bundle-service-rolebinding
  namespace: {{ default .Release.Namespace .Values.Master.OperationsCenterNamespace }}
  labels:
{{ include "cloudbees-core.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: casc-bundle-service
subjects:
- kind: ServiceAccount
  name: {{ include "cascBundleService.serviceAccount" . }}
{{- end -}}
