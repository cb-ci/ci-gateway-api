{{- if .Values.CascBundleService.enabled }}
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: casc-bundle-service
  namespace: {{ default .Release.Namespace .Values.Master.OperationsCenterNamespace }}
  labels:
{{ include "cloudbees-core.labels" . | indent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
- apiGroups:
  - "casc.bundleservice"
  resources:
  - "connectorupdates"
  verbs:
  - get
  - list
  - create
  - update
  - watch
{{- end -}}
