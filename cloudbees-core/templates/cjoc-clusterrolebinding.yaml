{{- if eq (include "rbac.install-cluster" .) "false" -}}
{{/* skipping clusterrolebinding creation */}}
{{- else if or (eq (include "rbac.install-cluster" .) "true") (and .Values.rbac.install (not (include "cloudbees-core.is-openshift" .))) -}}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cjoc-role-binding-{{ .Release.Namespace }}
  labels:
{{ include "cloudbees-core.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cjoc-master-management-{{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.rbac.serviceAccountName }}
{{- if .Values.Master.OperationsCenterNamespace }}
  namespace: {{.Values.Master.OperationsCenterNamespace}}
{{- else }}
  namespace: {{ .Release.Namespace }}
{{- end -}}
{{ include "rbac.group-subject" . }}
{{- end -}}
