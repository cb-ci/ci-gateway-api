{{- if and .Values.NetworkPolicy.Enabled .Values.PluggableStorageService.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pluggable-storage-service
  namespace: {{ default .Release.Namespace .Values.Master.OperationsCenterNamespace }}
  labels:
    app: pluggable-storage-service
{{ include "cloudbees-core.labels" . | indent 4 }}
spec:
{{ include "PluggableStorageService.podSelector" . | indent 2 }}
  ingress:
  - ports:
    - port: 8080
      protocol: TCP
    from: {{ fromYamlArray (include "master.podSelectors" .) | toYaml | nindent 4 }}
{{- end -}}
