credentials:
  system:
    domainCredentials:
    - credentials:
      - usernamePassword:
          description: "gh-user-token"
          id: "gh-user-token"
          # https://github.com/jenkinsci/configuration-as-code-plugin/blob/master/docs/features/secrets.adoc#readfile
          password: ${readFile:/var/run/secrets/cjoc/githubToken}
          scope: GLOBAL
          # https://github.com/jenkinsci/configuration-as-code-plugin/blob/master/docs/features/secrets.adoc#readfile
          username: ${readFile:/var/run/secrets/cjoc/githubUser}
          usernameSecret: true